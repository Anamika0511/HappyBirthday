<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f3d9df;
    font-family: 'Segoe UI', sans-serif;
}

.card{

    width:90%;
    max-width:420px;
    background:white;
    padding:25px;
    border-radius:25px;
    text-align:center;

    box-shadow:0 15px 40px rgba(0,0,0,0.15);
}
.card img{
    width:100%;
    border-radius:15px;
    margin-bottom:15px;
}

h1{
    font-size:26px;
    color:#444;
}

p{
    color:#666;
}

.buttons{
    margin-top:20px;
}

button{

    border:none;
    padding:12px 28px;
    border-radius:25px;
    font-size:16px;
    cursor:pointer;
    margin:8px;
}

.yes{
    background:#e63950;
    color:white;
}
.no{
    background:#f3a6b1;
    color:white;
}

button:hover{
    transform:scale(1.05);
}

</style>

</head>

<body>

<div class="card">

<h1>Happpiesttt Birthdayyyyyyyy 🎂❤️ </h1>

<img src="birthday.gif">

<div class="letter">
Happiestttttt Birthdayyyyy to my sweetest little cuttuuu puttuuuu laddoooooo❤️ <br> 
I have many surprises for you but can share only one with you right now🥲<br>
Do you wanna see it?
</div>

<br>

<button class="yes" onclick="location.href='yes1.html'">Yes 💖</button>
<button class="no" onclick="location.href='no1.html'">No 😅</button>

</div>

</body>
</html>
