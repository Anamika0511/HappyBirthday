<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Final Chance 😄</title>

<style>

body{
    margin:0;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#ffd1dc;
    font-family:'Segoe UI', sans-serif;
}

.card{
    width:90%;
    max-width:420px;
    background:white;
    padding:25px;
    border-radius:25px;
    text-align:center;
    box-shadow:0 15px 40px rgba(0,0,0,0.15);
    position:relative;
}

.card img{
    width:100%;
    border-radius:15px;
    margin:15px 0;
}

h1{
    color:#444;
}

h2{
    color:#666;
}

button{
    padding:12px 22px;
    border:none;
    border-radius:25px;
    font-size:16px;
    cursor:pointer;
    margin:10px;
    transition:all 0.3s ease;
}

.yes{
    background:#e63950;
    color:white;
}

.no{
    background:#f3a6b1;
    color:white;
    position:absolute;
}

</style>

</head>

<body>

<div class="card">

<h1>Last chance 😏</h1>

<img src="no3.JPG">

<h2>Huhhhh, Pookie nhi ho mere?????</h2>

<button class="yes" id="yesButton" onclick="location.href='yes1.html'">Yes ❤️</button>

<button class="no" id="noButton" onmouseover="moveButton()">No 😅</button>

</div>

<script>

let size = 1;

function moveButton(){

let button = document.getElementById("noButton");
let yesButton = document.getElementById("yesButton");

let x = Math.random() * 300;
let y = Math.random() * 300;

button.style.left = x + "px";
button.style.top = y + "px";

/* increase Yes button size */

size += 0.2;
yesButton.style.transform = "scale(" + size + ")";

}

</script>

</body>
</html>
